name: Distributed Chromium build

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: cloudflare-rbe-tunnel
  cancel-in-progress: false

jobs:
  coordinator_1:
    name: coordinator-1
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/rbe-coordinator-stage
        with:
          stage-number: 1
          stage-timeout: 270m

  workers_1:
    name: worker-${{ matrix.worker }}
    strategy:
      fail-fast: false
      matrix:
        worker: ["1", "2", "3", "4", "5", "6"]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
      RBE_TUNNEL_HOSTNAME: ${{ vars.RBE_TUNNEL_HOSTNAME }}
      RBE_WORKER_ID: ${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/rbe-worker-stage
        with:
          stage-number: 1

  coordinator_2:
    name: coordinator-2
    needs: [coordinator_1, workers_1]
    if: needs.coordinator_1.outputs.finished != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/rbe-coordinator-stage
        with:
          stage-number: 2
          previous-checkpoint: rbe-progress-${{ github.run_id }}-1
          stage-timeout: 270m

  workers_2:
    name: worker-${{ matrix.worker }}
    needs: [coordinator_1, workers_1]
    if: needs.coordinator_1.outputs.finished != 'true'
    strategy:
      fail-fast: false
      matrix:
        worker: ["1-2", "2-2", "3-2", "4-2", "5-2", "6-2"]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
      RBE_TUNNEL_HOSTNAME: ${{ vars.RBE_TUNNEL_HOSTNAME }}
      RBE_WORKER_ID: ${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/rbe-worker-stage
        with:
          stage-number: 2

  coordinator_3:
    name: coordinator-3
    needs: [coordinator_2, workers_2]
    if: needs.coordinator_2.outputs.finished != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/rbe-coordinator-stage
        with:
          stage-number: 3
          previous-checkpoint: rbe-progress-${{ github.run_id }}-2
          stage-timeout: 300m

  workers_3:
    name: worker-${{ matrix.worker }}
    needs: [coordinator_2, workers_2]
    if: needs.coordinator_2.outputs.finished != 'true'
    strategy:
      fail-fast: false
      matrix:
        worker: ["1-3", "2-3", "3-3", "4-3", "5-3", "6-3"]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
      RBE_TUNNEL_HOSTNAME: ${{ vars.RBE_TUNNEL_HOSTNAME }}
      RBE_WORKER_ID: ${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/rbe-worker-stage
        with:
          stage-number: 3

  verify_result:
    name: Verify packages
    if: always()
    needs:
      - coordinator_1
      - workers_1
      - coordinator_2
      - workers_2
      - coordinator_3
      - workers_3
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FINISHED: ${{ needs.coordinator_1.outputs.finished == 'true' || needs.coordinator_2.outputs.finished == 'true' || needs.coordinator_3.outputs.finished == 'true' }}
    steps:
      - name: Require a completed build
        if: env.FINISHED != 'true'
        run: |
          echo "All three compilation stages ended without producing packages" >&2
          exit 1

      - name: Download APK packages
        if: env.FINISHED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: distributed-packages
          path: packages

      - name: Verify package checksums
        if: env.FINISHED == 'true'
        working-directory: packages
        run: sha256sum -c SHA256SUMS
