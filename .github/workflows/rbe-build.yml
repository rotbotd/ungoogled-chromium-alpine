name: Distributed Chromium build

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cloudflare-rbe-tunnel
  cancel-in-progress: false

jobs:
  coordinator:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DONE_ARTIFACT: rbe-finished-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h /

      - name: Build Alpine coordinator image
        run: |
          docker build \
            --file Containerfile \
            --tag ungoogled-chromium-alpine-builder \
            .

      - name: Start Buildbarn coordinator
        working-directory: rbe
        run: |
          mkdir -p \
            volumes/storage-ac/persistent_state \
            volumes/storage-cas/persistent_state \
            volumes/storage-fsac/persistent_state
          chmod 0700 \
            volumes/storage-ac \
            volumes/storage-ac/persistent_state \
            volumes/storage-cas \
            volumes/storage-cas/persistent_state \
            volumes/storage-fsac \
            volumes/storage-fsac/persistent_state
          docker compose -f coordinator.compose.yml up --detach

      - name: Start named Cloudflare tunnel
        env:
          TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          docker run --detach \
            --name rbe-cloudflared \
            --network host \
            --env TUNNEL_TOKEN \
            cloudflare/cloudflared:latest \
            tunnel --no-autoupdate run

      - name: Build packages with remote workers
        id: build
        continue-on-error: true
        run: |
          mkdir -p output
          sleep 60
          docker run --rm \
            --entrypoint /usr/local/bin/ci-rbe \
            --network host \
            --ulimit nofile=4096:4096 \
            --env SISO_REAPI_ADDRESS=127.0.0.1:8980 \
            --env SISO_REAPI_INSTANCE=alpine \
            --env SISO_REMOTE_JOBS=16 \
            --mount "type=bind,source=$PWD/output,target=/mnt/output" \
            ungoogled-chromium-alpine-builder

      - name: Upload APK packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: distributed-packages
          path: output/
          retention-days: 7
          compression-level: 0
          if-no-files-found: error

      - name: Record result
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          mkdir -p rbe-result
          printf '%s\n' "$BUILD_OUTCOME" > rbe-result/status

      - name: Publish completion signal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DONE_ARTIFACT }}
          path: rbe-result/status
          retention-days: 1
          if-no-files-found: error

      - name: Show coordinator status
        if: always()
        working-directory: rbe
        run: |
          df -h /
          du -sh volumes/* || true
          docker logs rbe-cloudflared || true
          docker compose -f coordinator.compose.yml ps
          docker compose -f coordinator.compose.yml logs --tail 500

      - name: Require a successful package build
        if: always() && steps.build.outcome != 'success'
        run: exit 1

  workers:
    name: worker-${{ matrix.worker }}
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
      DONE_ARTIFACT: rbe-finished-${{ github.run_id }}
      RBE_TUNNEL_HOSTNAME: ${{ vars.RBE_TUNNEL_HOSTNAME }}
      RBE_WORKER_ID: ${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h /

      - name: Build Alpine remote runner image
        run: |
          docker build \
            --file Containerfile \
            --tag ungoogled-chromium-alpine-builder \
            .
          docker build \
            --file rbe/ChromiumRunner.Containerfile \
            --tag ungoogled-chromium-alpine-rbe \
            .

      - name: Start worker
        working-directory: rbe
        run: |
          mkdir -p volumes/bb volumes/worker/build volumes/worker/cache
          chmod 0777 volumes/bb volumes/worker volumes/worker/build
          chmod 0700 volumes/worker/cache
          docker compose -f worker.compose.yml up --detach

      - name: Wait for coordinator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 350); do
            artifact_id=$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${DONE_ARTIFACT}\") | .id" \
                | head -n 1
            )
            if [[ -n "$artifact_id" ]]; then
              gh run download "$GITHUB_RUN_ID" \
                --name "$DONE_ARTIFACT" \
                --dir rbe-result
              exit 0
            fi
            echo "Coordinator still running (poll $attempt/350)"
            sleep 60
          done
          echo "Coordinator did not publish its completion signal" >&2
          exit 1

      - name: Show worker status
        if: always()
        working-directory: rbe
        run: |
          df -h /
          du -sh volumes/worker/* || true
          docker compose -f worker.compose.yml ps
          docker compose -f worker.compose.yml logs --tail 500
