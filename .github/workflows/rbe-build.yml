name: Distributed Chromium build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Validation depth
        required: true
        default: validate
        type: choice
        options:
          - validate
          - infrastructure-dry-run
          - checkpoint-canary
          - full

permissions:
  actions: write
  contents: read

concurrency:
  group: cloudflare-rbe-tunnels
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate distributed build configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Validate workflow syntax
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            rhysd/actionlint:1.7.7

      - name: Validate shell and package metadata
        run: |
          sudo apt-get update
          sudo apt-get install --yes jsonnet shellcheck
          shellcheck \
            podman.sh \
            scripts/ci-rbe.sh \
            scripts/ci-stage.sh \
            scripts/container-entrypoint.sh
          docker build \
            --file Containerfile \
            --tag ungoogled-chromium-alpine-builder \
            .
          docker run --rm ungoogled-chromium-alpine-builder validate
          docker run --rm \
            --entrypoint /bin/sh \
            ungoogled-chromium-alpine-builder \
            -n /usr/local/bin/ci-rbe

      - name: Validate both worker configurations
        run: |
          for target in x86_64 aarch64; do
            jsonnet \
              -J rbe/config \
              --ext-str GITHUB_RUN_ID=dry-run \
              --ext-str RBE_TARGET="$target" \
              --ext-str RBE_WORKER_ID=1 \
              rbe/config/worker.jsonnet > /dev/null
            GITHUB_RUN_ID=dry-run \
            CLOUDFLARE_ACCESS_CLIENT_ID=dry-run \
            CLOUDFLARE_ACCESS_CLIENT_SECRET=dry-run \
            RBE_TARGET="$target" \
            RBE_TUNNEL_HOSTNAME=example.invalid \
            RBE_WORKER_ID=1 \
              docker compose -f rbe/worker.compose.yml config --quiet
          done
          docker compose -f rbe/coordinator.compose.yml config --quiet

  x64:
    name: x86_64
    if: inputs.mode != 'validate'
    needs: preflight
    uses: ./.github/workflows/rbe-target.yml
    with:
      target: x86_64
      runner: ubuntu-24.04
      tunnel-hostname: ${{ vars.RBE_TUNNEL_HOSTNAME_X86_64 }}
      worker-matrix: ${{ inputs.mode == 'infrastructure-dry-run' && '["1","2"]' || '["1","2","3","4","5","6","7","8"]' }}
      stage-count: ${{ inputs.mode == 'full' && 4 || 2 }}
      stage-timeout: ${{ inputs.mode == 'full' && '120m' || inputs.mode == 'checkpoint-canary' && '15m' || '1m' }}
      dry-run: ${{ inputs.mode == 'infrastructure-dry-run' }}
      require-complete: ${{ inputs.mode == 'full' }}
    secrets:
      tunnel-token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_X86_64 }}
      access-client-id: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      access-client-secret: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}

  arm64:
    name: aarch64
    if: inputs.mode == 'full'
    needs: preflight
    uses: ./.github/workflows/rbe-target.yml
    with:
      target: aarch64
      runner: ubuntu-24.04-arm
      tunnel-hostname: ${{ vars.RBE_TUNNEL_HOSTNAME_AARCH64 }}
      worker-matrix: '["1","2","3","4","5","6","7","8"]'
      stage-count: 4
      stage-timeout: 120m
      require-complete: true
    secrets:
      tunnel-token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN_AARCH64 }}
      access-client-id: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
      access-client-secret: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
