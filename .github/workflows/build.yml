name: Build APK packages

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: ungoogled-chromium-build
  cancel-in-progress: false

jobs:
  stage-1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "1"

  stage-2:
    needs: stage-1
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "2"
          previous-finished: ${{ needs.stage-1.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-1

  stage-3:
    needs: stage-2
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "3"
          previous-finished: ${{ needs.stage-2.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-2

  stage-4:
    needs: stage-3
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "4"
          previous-finished: ${{ needs.stage-3.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-3

  stage-5:
    needs: stage-4
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "5"
          previous-finished: ${{ needs.stage-4.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-4

  stage-6:
    needs: stage-5
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "6"
          previous-finished: ${{ needs.stage-5.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-5

  stage-7:
    needs: stage-6
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
      - id: stage
        uses: ./.github/actions/build-stage
        with:
          stage-number: "7"
          previous-finished: ${{ needs.stage-6.outputs.finished }}
          progress-name: progress-${{ github.run_id }}-6

  verify-result:
    needs: stage-7
    runs-on: ubuntu-latest
    steps:
      - name: Require a completed package
        if: needs.stage-7.outputs.finished != 'true'
        run: |
          echo "Chromium did not finish within seven compilation stages" >&2
          exit 1

      - name: Download packages
        if: needs.stage-7.outputs.finished == 'true'
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages

      - name: Verify package checksums
        if: needs.stage-7.outputs.finished == 'true'
        working-directory: packages
        run: sha256sum -c SHA256SUMS
