name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build validation image
        run: >-
          docker build
          --file Containerfile
          --tag ungoogled-chromium-alpine-builder
          .

      - name: Validate APKBUILD and scripts
        run: docker run --rm ungoogled-chromium-alpine-builder validate
