name: RBE coordinator stage
description: Run one resumable Chromium compilation stage and checkpoint Buildbarn

inputs:
  target:
    description: Alpine target architecture
    required: true
  stage-number:
    description: Sequential stage number
    required: true
  previous-checkpoint:
    description: Checkpoint artifact from the previous stage
    required: false
    default: ""
  stage-timeout:
    description: Maximum time spent in the Siso build
    required: true
  expected-workers:
    description: Number of Buildbarn workers required before compiling
    required: true
  dry-run:
    description: Create a synthetic checkpoint without compiling Chromium
    required: false
    default: "false"

outputs:
  finished:
    description: Whether the APK packages have been produced
    value: ${{ steps.result.outputs.finished }}
  state:
    description: Stage result (success, checkpoint, or failure)
    value: ${{ steps.result.outputs.state }}

runs:
  using: composite
  steps:
    - name: Verify native target architecture
      shell: bash
      env:
        EXPECTED_TARGET: ${{ inputs.target }}
      run: |
        actual_target=$(uname -m)
        if [[ "$actual_target" != "$EXPECTED_TARGET" ]]; then
          echo "Expected $EXPECTED_TARGET runner, got $actual_target" >&2
          exit 1
        fi

    - name: Free runner disk space
      shell: bash
      run: |
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL
        docker system prune --all --force
        df -h /

    - name: Download previous checkpoint
      if: inputs.previous-checkpoint != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.previous-checkpoint }}
        path: input

    - name: Create stage directories
      shell: bash
      run: mkdir -p input output progress

    - name: Restore Buildbarn checkpoint
      if: inputs.previous-checkpoint != ''
      shell: bash
      run: |
        (
          cd input
          sha256sum -c rbe.tar.zst.sha256
        )
        sudo tar --sparse -xf input/rbe.tar.zst -C rbe
        sudo rm -f input/rbe.tar.zst input/rbe.tar.zst.sha256

    - name: Build Alpine coordinator image
      shell: bash
      run: |
        docker build \
          --file Containerfile \
          --tag ungoogled-chromium-alpine-builder \
          .

    - name: Start Buildbarn coordinator
      shell: bash
      working-directory: rbe
      run: |
        mkdir -p \
          volumes/storage-ac/persistent_state \
          volumes/storage-cas/persistent_state \
          volumes/storage-fsac/persistent_state
        chmod 0700 \
          volumes/storage-ac \
          volumes/storage-ac/persistent_state \
          volumes/storage-cas \
          volumes/storage-cas/persistent_state \
          volumes/storage-fsac \
          volumes/storage-fsac/persistent_state
        docker compose -f coordinator.compose.yml up --detach

    - name: Start named Cloudflare tunnel
      shell: bash
      run: |
        docker run --detach \
          --name rbe-cloudflared \
          --network host \
          --env TUNNEL_TOKEN \
          cloudflare/cloudflared:latest \
          tunnel --no-autoupdate run

        for attempt in $(seq 1 60); do
          if docker logs rbe-cloudflared 2>&1 \
            | grep -q "Registered tunnel connection"; then
            date -u +%Y-%m-%dT%H:%M:%SZ > progress/coordinator-ready
            echo "Named tunnel registered with Cloudflare"
            exit 0
          fi
          if [[ "$(docker inspect -f '{{.State.Running}}' rbe-cloudflared)" != "true" ]]; then
            docker logs rbe-cloudflared >&2
            echo "Named tunnel stopped before registering with Cloudflare" >&2
            exit 1
          fi
          echo "Waiting for named tunnel registration ($attempt/60)"
          sleep 2
        done
        docker logs rbe-cloudflared >&2
        echo "Named tunnel did not register with Cloudflare" >&2
        exit 1

    - name: Publish coordinator readiness
      uses: actions/upload-artifact@v7
      with:
        name: rbe-ready-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        path: progress/coordinator-ready
        retention-days: 1
        if-no-files-found: error

    - name: Wait for remote workers
      shell: bash
      env:
        EXPECTED_WORKERS: ${{ inputs.expected-workers }}
      run: |
        stable_polls=0
        for attempt in $(seq 1 120); do
          metrics=$(curl --fail --silent --show-error \
            --max-time 5 http://127.0.0.1:7981/metrics || true)
          created=$(
            awk '
              /^buildbarn_builder_in_memory_build_queue_workers_created_total\{/ {
                total += $2
              }
              END { print total + 0 }
            ' <<< "$metrics"
          )
          removed=$(
            awk '
              /^buildbarn_builder_in_memory_build_queue_workers_removed_total\{/ {
                total += $2
              }
              END { print total + 0 }
            ' <<< "$metrics"
          )
          connected=$((created - removed))

          if (( connected >= EXPECTED_WORKERS )); then
            stable_polls=$((stable_polls + 1))
            echo "Buildbarn reports $connected/$EXPECTED_WORKERS workers ($stable_polls/3 stable polls)"
            if (( stable_polls >= 3 )); then
              exit 0
            fi
          else
            stable_polls=0
            echo "Waiting for Buildbarn workers: $connected/$EXPECTED_WORKERS ($attempt/120)"
          fi
          sleep 10
        done

        curl --fail --silent --show-error http://127.0.0.1:7981/metrics \
          | grep -E 'buildbarn_builder_in_memory_build_queue_workers_(created|removed)_total' \
          || true
        docker compose -f rbe/coordinator.compose.yml logs scheduler router || true
        echo "Expected $EXPECTED_WORKERS Buildbarn workers did not connect" >&2
        exit 1

    - name: Build packages with remote workers
      id: build
      continue-on-error: true
      shell: bash
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        STAGE_TIMEOUT: ${{ inputs.stage-timeout }}
      run: |
        telemetry() {
          while sleep 300; do
            echo "=== Coordinator telemetry $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            df -h /
            free -h || true
            docker stats --no-stream || true
            docker compose -f rbe/coordinator.compose.yml ps || true
          done
        }
        telemetry &
        telemetry_pid=$!
        trap 'kill "$telemetry_pid" 2>/dev/null || true' EXIT

        dry_run=0
        if [[ "$DRY_RUN" == "true" ]]; then
          dry_run=1
        fi
        docker run --rm \
          --entrypoint /usr/local/bin/ci-rbe \
          --network host \
          --ulimit nofile=4096:4096 \
          --env CI_RBE_DRY_RUN="$dry_run" \
          --env CI_RBE_STAGE_NUMBER="${{ inputs.stage-number }}" \
          --env CI_RBE_STAGE_TIMEOUT="$STAGE_TIMEOUT" \
          --env RBE_TARGET="${{ inputs.target }}" \
          --env SISO_REAPI_ADDRESS=127.0.0.1:8980 \
          --env SISO_REAPI_INSTANCE=alpine \
          --env SISO_REMOTE_JOBS=28 \
          --mount "type=bind,source=$PWD/input,target=/mnt/input" \
          --mount "type=bind,source=$PWD/output,target=/mnt/output" \
          --mount "type=bind,source=$PWD/progress,target=/mnt/progress" \
          ungoogled-chromium-alpine-builder

    - name: Stop coordinator services
      if: always()
      shell: bash
      run: |
        docker logs rbe-cloudflared > rbe-cloudflared.log 2>&1 || true
        docker rm --force rbe-cloudflared || true
        docker compose -f rbe/coordinator.compose.yml stop --timeout 60 || true

    - name: Determine stage result
      id: result
      if: always()
      shell: bash
      env:
        BUILD_OUTCOME: ${{ steps.build.outcome }}
      run: |
        state=failure
        finished=false
        if [[ "$BUILD_OUTCOME" == "success" && -f progress/finished ]]; then
          state=success
          finished=true
        elif [[ "$BUILD_OUTCOME" == "success" \
          && -f progress/package.tar.zst \
          && -f progress/package.tar.zst.sha256 ]]; then
          state=checkpoint
        fi
        echo "state=$state" >> "$GITHUB_OUTPUT"
        echo "finished=$finished" >> "$GITHUB_OUTPUT"

    - name: Checkpoint Buildbarn storage
      if: steps.result.outputs.state == 'checkpoint'
      shell: bash
      run: |
        sudo tar --sparse -I 'zstd -T0 -3' \
          -cf progress/rbe.tar.zst \
          -C rbe \
          volumes/storage-ac \
          volumes/storage-cas \
          volumes/storage-fsac
        sudo chown "$(id -u):$(id -g)" progress/rbe.tar.zst
        (
          cd progress
          sha256sum rbe.tar.zst > rbe.tar.zst.sha256
        )

    - name: Upload compilation checkpoint
      if: steps.result.outputs.state == 'checkpoint'
      uses: actions/upload-artifact@v7
      with:
        name: rbe-progress-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        path: |
          progress/package.tar.zst
          progress/package.tar.zst.sha256
          progress/rbe.tar.zst
          progress/rbe.tar.zst.sha256
        retention-days: 1
        compression-level: 0
        if-no-files-found: error

    - name: Upload APK packages
      if: steps.result.outputs.finished == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: distributed-packages-${{ inputs.target }}
        path: output/
        retention-days: 7
        compression-level: 0
        if-no-files-found: error

    - name: Upload failed build log
      if: steps.result.outputs.state == 'failure'
      uses: actions/upload-artifact@v7
      with:
        name: rbe-failure-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        path: progress/siso-build.log
        retention-days: 3
        if-no-files-found: ignore

    - name: Delete superseded checkpoint
      if: steps.result.outputs.state != 'failure' && inputs.previous-checkpoint != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PREVIOUS_CHECKPOINT: ${{ inputs.previous-checkpoint }}
      run: |
        artifact_id=$(
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --paginate \
            --jq ".artifacts[] | select(.name == \"$PREVIOUS_CHECKPOINT\") | .id" \
            | head -n 1
        )
        if [[ -n "$artifact_id" ]]; then
          gh api --method DELETE \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/$artifact_id"
        fi

    - name: Record stage status
      if: always()
      shell: bash
      env:
        STAGE_STATE: ${{ steps.result.outputs.state }}
      run: |
        mkdir -p progress
        printf '%s\n' "${STAGE_STATE:-failure}" > progress/stage-status

    - name: Publish completion signal
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: rbe-finished-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        path: progress/stage-status
        retention-days: 1
        if-no-files-found: error

    - name: Show coordinator status
      if: always()
      shell: bash
      run: |
        df -h /
        sudo du -sh rbe/volumes/* || true
        cat rbe-cloudflared.log || true
        docker compose -f rbe/coordinator.compose.yml ps
        docker compose -f rbe/coordinator.compose.yml logs --tail 500

    - name: Require a valid stage result
      if: always() && steps.result.outputs.state == 'failure'
      shell: bash
      run: exit 1
