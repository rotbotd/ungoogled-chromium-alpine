name: RBE worker stage
description: Run one worker for a resumable Chromium compilation stage

inputs:
  target:
    description: Alpine target architecture
    required: true
  stage-number:
    description: Sequential stage number
    required: true
  coordinator-job-name:
    description: Resolved Actions job name for the coordinator
    required: true

runs:
  using: composite
  steps:
    - name: Verify native target architecture
      shell: bash
      env:
        EXPECTED_TARGET: ${{ inputs.target }}
      run: |
        actual_target=$(uname -m)
        if [[ "$actual_target" != "$EXPECTED_TARGET" ]]; then
          echo "Expected $EXPECTED_TARGET runner, got $actual_target" >&2
          exit 1
        fi

    - name: Free runner disk space
      shell: bash
      run: |
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL
        docker system prune --all --force
        df -h /

    - name: Build Alpine remote runner image
      shell: bash
      run: |
        docker build \
          --file Containerfile \
          --tag ungoogled-chromium-alpine-builder \
          .
        docker build \
          --file rbe/ChromiumRunner.Containerfile \
          --tag ungoogled-chromium-alpine-rbe \
          .

    - name: Wait for coordinator tunnel
      shell: bash
      env:
        COORDINATOR_JOB_NAME: ${{ inputs.coordinator-job-name }}
        READY_ARTIFACT: rbe-ready-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        GH_TOKEN: ${{ github.token }}
      run: |
        api_failures=0
        completed_polls=0
        for attempt in $(seq 1 120); do
          if ! artifact_id=$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${READY_ARTIFACT}\") | .id" \
              | head -n 1
          ); then
            api_failures=$((api_failures + 1))
            echo "::warning::GitHub API artifact poll failed (${api_failures}/5)"
            if (( api_failures >= 5 )); then
              echo "GitHub API remained unavailable while waiting for ${READY_ARTIFACT}" >&2
              exit 1
            fi
            sleep 10
            continue
          fi
          if [[ -n "$artifact_id" ]]; then
            echo "Coordinator tunnel is registered with Cloudflare"
            exit 0
          fi

          if ! coordinator_state=$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
              --paginate \
              --jq ".jobs[] | select(.name == \"${COORDINATOR_JOB_NAME}\" or (.name | endswith(\" / ${COORDINATOR_JOB_NAME}\"))) | [.status, (.conclusion // \"\")] | @tsv" \
              | tail -n 1
          ); then
            api_failures=$((api_failures + 1))
            echo "::warning::GitHub API coordinator poll failed (${api_failures}/5)"
            if (( api_failures >= 5 )); then
              echo "GitHub API remained unavailable while checking ${COORDINATOR_JOB_NAME}" >&2
              exit 1
            fi
            sleep 10
            continue
          fi
          api_failures=0
          if [[ "$coordinator_state" == completed$'\t'* ]]; then
            completed_polls=$((completed_polls + 1))
            if (( completed_polls >= 3 )); then
              echo "Coordinator ended without publishing ${READY_ARTIFACT}: ${coordinator_state}" >&2
              exit 1
            fi
          else
            completed_polls=0
          fi

          echo "Waiting for coordinator tunnel ($attempt/120)"
          sleep 10
        done
        echo "Coordinator did not publish its tunnel readiness signal" >&2
        exit 1

    - name: Start worker
      shell: bash
      working-directory: rbe
      run: |
        mkdir -p volumes/bb volumes/worker/build volumes/worker/cache
        chmod 0777 volumes/bb volumes/worker volumes/worker/build
        chmod 0700 volumes/worker/cache
        docker compose -f worker.compose.yml up --detach

    - name: Wait for coordinator
      shell: bash
      env:
        COORDINATOR_JOB_NAME: ${{ inputs.coordinator-job-name }}
        DONE_ARTIFACT: rbe-finished-${{ github.run_id }}-${{ inputs.target }}-${{ inputs.stage-number }}
        GH_TOKEN: ${{ github.token }}
      run: |
        api_failures=0
        completed_polls=0
        for attempt in $(seq 1 350); do
          if ! artifact_id=$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${DONE_ARTIFACT}\") | .id" \
              | head -n 1
          ); then
            api_failures=$((api_failures + 1))
            echo "::warning::GitHub API artifact poll failed (${api_failures}/5)"
            if (( api_failures >= 5 )); then
              echo "GitHub API remained unavailable while waiting for ${DONE_ARTIFACT}" >&2
              exit 1
            fi
            sleep 60
            continue
          fi
          if [[ -n "$artifact_id" ]]; then
            if ! gh run download "$GITHUB_RUN_ID" \
              --name "$DONE_ARTIFACT" \
              --dir rbe-result; then
              api_failures=$((api_failures + 1))
              echo "::warning::GitHub completion artifact download failed (${api_failures}/5)"
              if (( api_failures >= 5 )); then
                echo "GitHub remained unavailable while downloading ${DONE_ARTIFACT}" >&2
                exit 1
              fi
              sleep 60
              continue
            fi
            cat rbe-result/stage-status
            exit 0
          fi

          if ! coordinator_state=$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
              --paginate \
              --jq ".jobs[] | select(.name == \"${COORDINATOR_JOB_NAME}\" or (.name | endswith(\" / ${COORDINATOR_JOB_NAME}\"))) | [.status, (.conclusion // \"\")] | @tsv" \
              | tail -n 1
          ); then
            api_failures=$((api_failures + 1))
            echo "::warning::GitHub API coordinator poll failed (${api_failures}/5)"
            if (( api_failures >= 5 )); then
              echo "GitHub API remained unavailable while checking ${COORDINATOR_JOB_NAME}" >&2
              exit 1
            fi
            sleep 60
            continue
          fi
          api_failures=0
          if [[ "$coordinator_state" == completed$'\t'* ]]; then
            completed_polls=$((completed_polls + 1))
            if (( completed_polls >= 3 )); then
              echo "Coordinator ended without publishing ${DONE_ARTIFACT}: ${coordinator_state}" >&2
              exit 1
            fi
            echo "Coordinator completed; waiting for artifact visibility ($completed_polls/3)"
          else
            completed_polls=0
          fi

          echo "Coordinator still running (poll $attempt/350)"
          sleep 60
        done
        echo "Coordinator did not publish its completion signal" >&2
        exit 1

    - name: Show worker status
      if: always()
      shell: bash
      working-directory: rbe
      run: |
        df -h /
        du -sh volumes/worker/* || true
        docker compose -f worker.compose.yml ps
        docker compose -f worker.compose.yml logs --tail 500

    - name: Stop worker
      if: always()
      shell: bash
      working-directory: rbe
      run: docker compose -f worker.compose.yml down || true
